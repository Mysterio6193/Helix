apiVersion: apps/v1
kind: Deployment
metadata:
  name: helix-api
  labels:
    app: helix
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helix
      component: api
  template:
    metadata:
      labels:
        app: helix
        component: api
    spec:
      containers:
        - name: api
          image: helix-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: helix-secrets
            - configMapRef:
                name: helix-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: helix-api
spec:
  selector:
    app: helix
    component: api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
