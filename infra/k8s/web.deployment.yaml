apiVersion: apps/v1
kind: Deployment
metadata:
  name: helix-web
  labels:
    app: helix
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helix
      component: web
  template:
    metadata:
      labels:
        app: helix
        component: web
    spec:
      containers:
        - name: web
          image: helix-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: helix-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: helix-config
                  key: NEXT_PUBLIC_WS_URL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: helix-web
spec:
  selector:
    app: helix
    component: web
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
