version: "3.9"

x-api-env: &api-env
  HELIX_ENV: ${HELIX_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SECRET_KEY: ${SECRET_KEY}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_REGION: ${S3_REGION}
  S3_BUCKET: ${S3_BUCKET}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
  RUNWAY_API_KEY: ${RUNWAY_API_KEY}
  GOOGLE_VEO_API_KEY: ${GOOGLE_VEO_API_KEY}
  VERCEL_TOKEN: ${VERCEL_TOKEN}
  VERCEL_TEAM_ID: ${VERCEL_TEAM_ID}
  GITHUB_TOKEN: ${GITHUB_TOKEN}
  GITHUB_ORG: ${GITHUB_ORG}
  CANVA_CLIENT_ID: ${CANVA_CLIENT_ID}
  CANVA_CLIENT_SECRET: ${CANVA_CLIENT_SECRET}
  FIGMA_CLIENT_ID: ${FIGMA_CLIENT_ID}
  FIGMA_CLIENT_SECRET: ${FIGMA_CLIENT_SECRET}
  NOTION_CLIENT_ID: ${NOTION_CLIENT_ID}
  NOTION_CLIENT_SECRET: ${NOTION_CLIENT_SECRET}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
  BRAVE_API_KEY: ${BRAVE_API_KEY}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
  LANGFUSE_HOST: ${LANGFUSE_HOST}
  API_HOST: ${API_HOST:-0.0.0.0}
  API_PORT: ${API_PORT:-8000}
  API_PUBLIC_URL: ${API_PUBLIC_URL}
  WEB_PUBLIC_URL: ${WEB_PUBLIC_URL}
  CORS_ORIGINS: ${CORS_ORIGINS}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: helix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-helix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helix}
      POSTGRES_DB: ${POSTGRES_DB:-helix}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helix} -d ${POSTGRES_DB:-helix}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: helix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: helix-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:latest
    container_name: helix-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-helix-assets}
    entrypoint: ["/bin/sh", "-c"]
    command: ["/scripts/bootstrap.sh"]
    volumes:
      - ./minio/bootstrap.sh:/scripts/bootstrap.sh:ro
    restart: "no"

  langfuse:
    image: langfuse/langfuse:2
    container_name: helix-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-helix}:${POSTGRES_PASSWORD:-helix}@postgres:5432/${POSTGRES_DB:-helix}
      NEXTAUTH_SECRET: ${SECRET_KEY}
      SALT: ${SECRET_KEY}
      NEXTAUTH_URL: ${LANGFUSE_HOST:-http://localhost:3001}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    ports:
      - "3001:3000"
    volumes:
      - langfuse_data:/app/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    image: helix-api:latest
    container_name: helix-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *api-env
    ports:
      - "8000:8000"
    command: ["uvicorn", "helix.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ../apps/api:/app
      - ../skills:/app/skills:ro
      - ../design-systems:/app/design-systems:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    image: helix-api:latest
    container_name: helix-worker
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      <<: *api-env
    command: ["python", "-m", "helix.workers.worker"]
    volumes:
      - ../apps/api:/app
      - ../apps/workers:/app/helix/workers
      - ../skills:/app/skills:ro
      - ../design-systems:/app/design-systems:ro

  scheduler:
    image: helix-api:latest
    container_name: helix-scheduler
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      <<: *api-env
    command: ["python", "-m", "helix.workers.scheduler"]
    volumes:
      - ../apps/api:/app
      - ../apps/workers:/app/helix/workers

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    image: helix-web:latest
    container_name: helix-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "3000:3000"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  pg_data:
  minio_data:
  langfuse_data:
